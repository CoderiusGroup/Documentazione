name: Compila Documenti Typst

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**/*.typ'
      - '!src/templates/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compila Typst e Genera Struttura
        run: |
          find src -name "*.typ" -not -name "definizioni.typ" -not -name "__glossary_tmp__*" -not -path "src/templates/*" | while read typst_file; do

            percorso_relativo="${typst_file#src/}"
            cartella_destinazione=$(dirname "$percorso_relativo")
            nome_pdf=$(basename "$typst_file" .typ).pdf
            pdf_finale="$cartella_destinazione/$nome_pdf"

            mkdir -p "$cartella_destinazione"

            temp_file="$(dirname "$typst_file")/__glossary_tmp__$(basename "$typst_file")"
            cat .github/glossary_header.typ "$typst_file" > "$temp_file"

            echo "Compilazione di $typst_file -> $pdf_finale"
            docker run --rm -v $(pwd):/app -w /app ghcr.io/typst/typst:latest compile --root . "$temp_file" "$pdf_finale"

            rm -f "$temp_file"

          done

      - name: Installa aspell (dizionario italiano)
        run: sudo apt-get install -y aspell aspell-it

      - name: Calcola Indice di Gulpease
        run: python3 .github/scripts/gulpease.py

      - name: Controlla Correttezza Ortografica
        run: python3 .github/scripts/ortografia.py

      - name: Commit e Push dei PDF e metriche
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: aggiornamento automatico PDF e metriche [skip ci]"
          file_pattern: '**/*.pdf src/metrics/gulpease.json src/metrics/ortografia.json'